<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Dashboard – Click Cabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --blue:#01456c; --yellow:#f5a800; --border:#dde3ea; --text:#1a2b3c; --muted:#6b7c8d; --bg:#f4f7fa; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .topbar { background:var(--blue); height:60px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.2); position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-left img { height:36px; width:36px; border-radius:6px; background:#fff; padding:3px; object-fit:contain; }
    .topbar-title { color:#fff; font-weight:800; font-size:1.1rem; }
    .topbar-title span { color:var(--yellow); }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .vendor-name-tag { color:rgba(255,255,255,0.85); font-size:0.85rem; }
    .logout-btn { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:6px; padding:6px 14px; font-size:0.8rem; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
    .logout-btn:hover { background:rgba(255,255,255,0.2); }

    /* BLOCKED SCREENS */
    .blocked-screen { max-width:560px; margin:80px auto; padding:20px; text-align:center; }
    .blocked-card { background:#fff; border-radius:20px; box-shadow:0 8px 32px rgba(0,0,0,0.10); overflow:hidden; }
    .blocked-top { padding:44px 36px 36px; }
    .blocked-icon { width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 20px; }
    .blocked-card h2 { font-size:1.4rem; font-weight:800; margin-bottom:10px; }
    .blocked-card p { font-size:0.88rem; color:var(--muted); line-height:1.7; margin-bottom:0; }
    .admin-reason { margin:14px 0 0; font-size:0.85rem; padding:12px 16px; border-radius:10px; text-align:left; border-left:3px solid; }
    .blocked-actions { padding:20px 36px 32px; display:flex; flex-direction:column; gap:10px; }
    .btn-action { padding:13px; border-radius:8px; font-weight:800; font-size:0.92rem; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:none; font-family:inherit; transition:all 0.2s; }

    /* rejected */
    .rejected-top { background:#fdf0f0; }
    .rejected-top .blocked-icon { background:#fdd; color:#c0392b; }
    .rejected-top h2 { color:#c0392b; }
    .rejected-reason { background:#fff8f8; border-color:#c0392b; color:#c0392b; }
    .btn-reapply { background:var(--yellow); color:var(--blue); }
    .btn-reapply:hover { background:#e09900; }

    /* reverify */
    .reverify-top { background:#f0eaff; }
    .reverify-top .blocked-icon { background:#e4d8ff; color:#6b21d6; }
    .reverify-top h2 { color:#6b21d6; }
    .reverify-reason { background:#f5f0ff; border-color:#6b21d6; color:#6b21d6; }
    .btn-reverify { background:#6b21d6; color:#fff; }
    .btn-reverify:hover { background:#5a1ab5; }

    /* restricted */
    .restricted-top { background:#fff0e6; }
    .restricted-top .blocked-icon { background:#ffe0c8; color:#c05000; }
    .restricted-top h2 { color:#c05000; }
    .restricted-reason { background:#fff8f4; border-color:#c05000; color:#c05000; }

    /* old */
    .old-top { background:#f0f4f8; }
    .old-top .blocked-icon { background:#dce8f0; color:#4a6070; }
    .old-top h2 { color:#4a6070; }

    .contact-box { margin:16px 36px 0; padding:14px 18px; background:#f4f7fa; border-radius:10px; font-size:0.82rem; color:var(--muted); text-align:left; }
    .contact-box a { color:var(--blue); font-weight:700; text-decoration:none; }

    .btn-logout-blocked { background:#f4f7fa; color:var(--muted); border:1.5px solid var(--border); }
    .btn-logout-blocked:hover { background:#e8edf2; }

    /* NORMAL DASHBOARD */
    .content { max-width:960px; margin:0 auto; padding:28px 20px; }
    .status-banner { border-radius:14px; padding:20px 24px; margin-bottom:24px; display:flex; align-items:flex-start; gap:16px; background:#e8f7ef; border:1.5px solid #a8dfc0; }
    .banner-icon { width:48px; height:48px; border-radius:50%; background:#c8f0dc; color:#1a7f4b; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .banner-text h3 { font-size:0.98rem; font-weight:800; color:#1a7f4b; margin-bottom:3px; }
    .banner-text p { font-size:0.83rem; color:var(--muted); line-height:1.5; }

    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .card { background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(1,69,108,0.07); overflow:hidden; }
    .card-header { background:var(--blue); color:#fff; padding:13px 20px; font-size:0.88rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .card-header i { color:var(--yellow); }
    .card-body { padding:16px 20px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f0f4f8; font-size:0.83rem; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--muted); font-weight:600; }
    .info-value { font-weight:700; color:var(--text); text-align:right; max-width:58%; word-break:break-word; }

    .upload-card { grid-column:1/-1; }
    .upload-intro { font-size:0.82rem; color:var(--muted); margin-bottom:16px; line-height:1.6; }
    .upload-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .upload-item { border:2px dashed var(--border); border-radius:12px; padding:16px 10px; text-align:center; transition:all 0.2s; position:relative; cursor:pointer; background:#fafcff; }
    .upload-item:hover { border-color:var(--blue); background:#f0f7ff; }
    .upload-item.uploaded { border-color:#1a7f4b; border-style:solid; background:#f0faf5; cursor:default; }
    .upload-item .item-icon { font-size:1.5rem; margin-bottom:6px; display:block; color:var(--blue); }
    .upload-item.uploaded .item-icon { color:#1a7f4b; }
    .upload-item h4 { font-size:0.72rem; font-weight:700; color:var(--text); margin-bottom:3px; }
    .upload-item .status-text { font-size:0.65rem; color:var(--muted); }
    .upload-item.uploaded .status-text { color:#1a7f4b; font-weight:600; }
    .upload-item input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-item.uploaded input[type=file] { pointer-events:none; }

    .upload-actions { margin-top:16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .submit-docs-btn { background:var(--yellow); color:var(--blue); font-weight:800; font-size:0.9rem; padding:11px 26px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:8px; transition:background 0.2s; }
    .submit-docs-btn:hover { background:#e09900; }
    .submit-docs-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .upload-note { font-size:0.78rem; color:var(--muted); }

    .contact-card { margin-top:0; }
    .contact-body { padding:16px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .contact-body i { font-size:1.4rem; color:var(--blue); flex-shrink:0; }
    .contact-body h4 { font-weight:700; font-size:0.88rem; margin-bottom:3px; }
    .contact-body p { font-size:0.8rem; color:var(--muted); }
    .contact-body a { color:var(--blue); font-weight:700; text-decoration:none; }

    .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:14px; color:var(--muted); }
    .loading-screen i { font-size:2rem; color:var(--blue); }

    @media(max-width:680px) { .dash-grid { grid-template-columns:1fr; } .upload-grid { grid-template-columns:1fr 1fr; } .blocked-top { padding:32px 24px 24px; } .blocked-actions,.contact-box { margin-left:24px; margin-right:24px; } }
    @media(max-width:440px) { .upload-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="https://clickcab-7fv3.vercel.app/images/logo.jpg" alt="Click Cabs"/>
    <span class="topbar-title">Click<span>Cabs</span></span>
  </div>
  <div class="topbar-right">
    <span class="vendor-name-tag" id="vendorNameTag"></span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div id="mainContent">
  <div class="loading-screen"><i class="fas fa-spinner fa-spin"></i><p>Loading your dashboard…</p></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoITUbvm1c0-Ud9VN_jVOZg99dg42jPgY",
    authDomain: "clickcabs-772bd.firebaseapp.com",
    projectId: "clickcabs-772bd",
    storageBucket: "clickcabs-772bd.firebasestorage.app",
    messagingSenderId: "861153834886",
    appId: "1:861153834886:web:eae295a297c47120c31e07"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  await setPersistence(auth, browserLocalPersistence);

  const DOC_TYPES = [
    { key:'rcBook', label:'RC Book', icon:'fa-file-alt' },
    { key:'insurance', label:'Insurance Certificate', icon:'fa-shield-alt' },
    { key:'driverLicence', label:'Driver Licence', icon:'fa-id-card' },
    { key:'aadhaarCard', label:'Aadhaar Card', icon:'fa-address-card' },
    { key:'panCard', label:'PAN Card', icon:'fa-credit-card' },
    { key:'vehicleFront', label:'Vehicle Front Photo', icon:'fa-camera' },
    { key:'vehicleInterior', label:'Vehicle Interior', icon:'fa-car' },
    { key:'vehicleSide', label:'Vehicle Side Photo', icon:'fa-car-side' }
  ];

  let currentUID = null;
  let selectedFiles = {};
  let uploadedDocs = {};

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'vendor-login.html'; return; }
    currentUID = user.uid;
    const snap = await getDoc(doc(db, "vendors", user.uid));
    if (!snap.exists()) { window.location.href = 'vendor-login.html'; return; }
    const v = snap.data();
    uploadedDocs = v.documents || {};
    document.getElementById('vendorNameTag').textContent = `${v.firstName} ${v.lastName}`;
    routeByStatus(v, user.uid);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth); window.location.href = 'vendor-login.html';
  });

  function routeByStatus(v, uid) {
    const status = v.status || 'pending';
    const reason = v.adminNote || '';
    const name = v.firstName || 'Partner';

    if (status === 'approved' || status === 'pending') {
      renderDashboard(v, uid, status);
    } else if (status === 'rejected') {
      renderBlocked('rejected', name, reason);
    } else if (status === 'reverify') {
      renderBlocked('reverify', name, reason);
    } else if (status === 'restricted') {
      renderBlocked('restricted', name, reason);
    } else if (status === 'old') {
      renderBlocked('old', name, reason);
    } else {
      renderDashboard(v, uid, status);
    }
  }

  function renderBlocked(type, name, reason) {
    const configs = {
      rejected: {
        topClass: 'rejected-top',
        icon: 'fa-times-circle',
        title: 'Application Not Approved',
        msg: `Hi ${name}, unfortunately your application was not approved at this time. You can review the reason below and reapply with corrected information.`,
        reasonClass: 'rejected-reason',
        reasonLabel: 'Reason for rejection:',
        actions: `
          <a href="vendor-signup.html" class="btn-action btn-reapply"><i class="fas fa-redo"></i> Reapply as Partner</a>
          <button class="btn-action btn-logout-blocked" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`
      },
      reverify: {
        topClass: 'reverify-top',
        icon: 'fa-redo',
        title: 'Reverification Required',
        msg: `Hi ${name}, our team needs you to update and resubmit certain details. Please review the note below and reapply with the corrected information.`,
        reasonClass: 'reverify-reason',
        reasonLabel: 'What needs to be updated:',
        actions: `
          <a href="vendor-signup.html" class="btn-action btn-reverify"><i class="fas fa-edit"></i> Resubmit Application</a>
          <button class="btn-action btn-logout-blocked" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`
      },
      restricted: {
        topClass: 'restricted-top',
        icon: 'fa-ban',
        title: 'Account Restricted',
        msg: `Hi ${name}, your account has been temporarily restricted by our team. Please review the reason below and contact Click Cabs support to resolve this.`,
        reasonClass: 'restricted-reason',
        reasonLabel: 'Reason for restriction:',
        actions: `
          <button class="btn-action btn-logout-blocked" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`
      },
      old: {
        topClass: 'old-top',
        icon: 'fa-archive',
        title: 'Thank You for Your Service',
        msg: `Hi ${name}, thank you for being a Click Cabs partner. Your account has been marked as inactive. If you'd like to reactivate, please contact our support team.`,
        reasonClass: '',
        reasonLabel: '',
        actions: `
          <button class="btn-action btn-logout-blocked" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`
      }
    };

    const c = configs[type];
    document.getElementById('mainContent').innerHTML = `
      <div class="blocked-screen">
        <div class="blocked-card">
          <div class="blocked-top ${c.topClass}">
            <div class="blocked-icon"><i class="fas ${c.icon}"></i></div>
            <h2>${c.title}</h2>
            <p>${c.msg}</p>
            ${reason && c.reasonClass ? `<div class="admin-reason ${c.reasonClass}"><strong>${c.reasonLabel}</strong><br/>${reason}</div>` : ''}
          </div>
          <div class="contact-box">
            <i class="fas fa-headset" style="margin-right:6px;color:var(--blue);"></i>
            Contact support: <a href="tel:+919702290804">+91 97022 90804</a> &nbsp;|&nbsp; <a href="mailto:support@clickcabs.in">support@clickcabs.in</a>
          </div>
          <div class="blocked-actions">${c.actions}</div>
        </div>
      </div>`;
  }

  function renderDashboard(v, uid, status) {
    const isApproved = status === 'approved';
    document.getElementById('mainContent').innerHTML = `
      <div class="content">
        ${isApproved ? `
        <div class="status-banner">
          <div class="banner-icon"><i class="fas fa-check-circle"></i></div>
          <div class="banner-text">
            <h3>You're Approved — Welcome to Click Cabs! 🎉</h3>
            <p>Your account is active. Upload your documents below to complete your onboarding.</p>
          </div>
        </div>` : `
        <div class="status-banner" style="background:#fff8e6;border-color:#f5e4a0;">
          <div class="banner-icon" style="background:#fff3cc;color:#d48e00;"><i class="fas fa-clock"></i></div>
          <div class="banner-text">
            <h3 style="color:#d48e00;">Application Under Review</h3>
            <p>Our team is reviewing your application. You'll receive a call or WhatsApp message once approved (24–48 hours).</p>
          </div>
        </div>`}

        <div class="dash-grid">
          <div class="card">
            <div class="card-header"><i class="fas fa-user"></i> Your Details</div>
            <div class="card-body">
              <div class="info-row"><span class="info-label">Name</span><span class="info-value">${v.firstName} ${v.lastName}</span></div>
              <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${v.phone||'–'}</span></div>
              <div class="info-row"><span class="info-label">Email</span><span class="info-value">${v.email||'–'}</span></div>
              <div class="info-row"><span class="info-label">City</span><span class="info-value">${v.operatingCity||'–'}</span></div>
              <div class="info-row"><span class="info-label">Driver Type</span><span class="info-value">${v.driverType||'–'}</span></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><i class="fas fa-car"></i> Vehicle Details</div>
            <div class="card-body">
              <div class="info-row"><span class="info-label">Model</span><span class="info-value">${v.vehicleModel||'–'}</span></div>
              <div class="info-row"><span class="info-label">Type</span><span class="info-value">${v.vehicleType||'–'}</span></div>
              <div class="info-row"><span class="info-label">Year</span><span class="info-value">${v.vehicleYear||'–'}</span></div>
              <div class="info-row"><span class="info-label">Reg. No.</span><span class="info-value">${v.registrationNumber||'–'}</span></div>
              <div class="info-row"><span class="info-label">Fuel / AC</span><span class="info-value">${v.fuelType||'–'} / ${v.acAvailable==='yes'?'AC':'Non-AC'}</span></div>
              <div class="info-row"><span class="info-label">Seating</span><span class="info-value">${v.seatingCapacity||'–'}</span></div>
            </div>
          </div>

          <div class="card upload-card">
            <div class="card-header"><i class="fas fa-file-upload"></i> Documents & Photos</div>
            <div class="card-body">
              ${isApproved ? `
              <p class="upload-intro">Upload clear photos or scans of your documents. Accepted formats: JPG, PNG, PDF. All 8 are required to complete onboarding.</p>
              <div class="upload-grid">
                ${DOC_TYPES.map(d => {
                  const done = uploadedDocs[d.key];
                  return `<div class="upload-item ${done?'uploaded':''}" id="item_${d.key}">
                    <i class="fas ${done?'fa-check-circle':d.icon} item-icon"></i>
                    <h4>${d.label}</h4>
                    <div class="status-text" id="status_${d.key}">${done?'Uploaded ✓':'Click to upload'}</div>
                    ${!done?`<input type="file" accept=".jpg,.jpeg,.png,.pdf" data-key="${d.key}" onchange="fileChosen(this)"/>`:''}
                  </div>`;
                }).join('')}
              </div>
              <div class="upload-actions">
                <button class="submit-docs-btn" id="submitDocsBtn" onclick="uploadAllDocs('${uid}')">
                  <i class="fas fa-cloud-upload-alt"></i> Save Documents
                </button>
                <span class="upload-note" id="uploadNote">Select files above then click Save</span>
              </div>` :
              `<div style="text-align:center;padding:32px;color:var(--muted);">
                <i class="fas fa-lock" style="font-size:2rem;color:#c8d8e4;margin-bottom:12px;display:block;"></i>
                <p style="font-size:0.85rem;">Document upload will be unlocked once your application is approved.</p>
              </div>`}
            </div>
          </div>
        </div>

        <div class="card contact-card">
          <div class="contact-body">
            <i class="fas fa-headset"></i>
            <div>
              <h4>Need help? Contact Click Cabs Support</h4>
              <p>Call / WhatsApp: <a href="tel:+919702290804">+91 97022 90804</a> &nbsp;|&nbsp; Email: <a href="mailto:support@clickcabs.in">support@clickcabs.in</a></p>
            </div>
          </div>
        </div>
      </div>`;
  }

  window.fileChosen = function(input) {
    const key = input.dataset.key;
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { alert('Max file size is 10MB.'); return; }
    selectedFiles[key] = file;
    const item = document.getElementById(`item_${key}`);
    item.style.borderColor = 'var(--yellow)';
    item.style.borderStyle = 'solid';
    document.getElementById(`status_${key}`).textContent = file.name.length > 16 ? file.name.substring(0,16)+'…' : file.name;
    document.getElementById(`status_${key}`).style.color = '#d48e00';
  };

  window.uploadAllDocs = async function(uid) {
    if (Object.keys(selectedFiles).length === 0) { alert('Please select at least one file first.'); return; }
    const btn = document.getElementById('submitDocsBtn');
    const note = document.getElementById('uploadNote');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

    const newDocs = { ...uploadedDocs };
    let done = 0;
    const keys = Object.keys(selectedFiles);

    for (const key of keys) {
      const file = selectedFiles[key];
      note.textContent = `Saving ${done+1} of ${keys.length}…`;
      try {
        // Convert to base64 and save to Firestore (no Storage needed)
        const base64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = () => res(reader.result);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
        newDocs[key] = { name: file.name, type: file.type, data: base64, uploadedAt: new Date().toISOString() };
        const item = document.getElementById(`item_${key}`);
        if (item) {
          item.classList.add('uploaded');
          item.style.borderColor = '';
          item.style.borderStyle = '';
          item.querySelector('i').className = 'fas fa-check-circle item-icon';
          document.getElementById(`status_${key}`).textContent = 'Uploaded ✓';
          document.getElementById(`status_${key}`).style.color = '#1a7f4b';
        }
        done++;
      } catch(e) {
        document.getElementById(`status_${key}`).textContent = 'Failed — retry';
        document.getElementById(`status_${key}`).style.color = '#c0392b';
      }
    }

    await updateDoc(doc(db, "vendors", uid), { documents: newDocs, documentsUpdatedAt: new Date().toISOString() });
    uploadedDocs = newDocs;
    selectedFiles = {};
    note.textContent = `✓ ${done} of ${keys.length} saved successfully!`;
    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Save Documents';
    btn.disabled = false;
  };

  window.doLogout = async function() {
    await signOut(auth); window.location.href = 'vendor-login.html';
  };
</script>
</body>
</html>
