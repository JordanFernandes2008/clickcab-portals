<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Click Cabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --blue: #01456c; --yellow: #f5a800; --border: #dde3ea; --text: #1a2b3c; --muted: #6b7c8d; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1f2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 32px;
    }
    .brand img { height: 44px; width: 44px; object-fit: contain; border-radius: 8px; background: #fff; padding: 4px; }
    .brand-text { color: #fff; font-size: 1.4rem; font-weight: 800; }
    .brand-text span { color: var(--yellow); }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%; max-width: 420px; overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--blue), #025a8e);
      padding: 28px 32px 24px; text-align: center;
    }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(245,168,0,0.15); border: 1px solid var(--yellow);
      border-radius: 20px; padding: 4px 14px;
      font-size: 0.72rem; font-weight: 700;
      color: var(--yellow); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 14px;
    }
    .card-header h2 { color: #fff; font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .card-header p { color: rgba(255,255,255,0.7); font-size: 0.82rem; }

    .card-body { padding: 28px 32px 32px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; }
    input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 11px 14px 11px 38px; font-size: 0.92rem;
      color: var(--text); outline: none; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(1,69,108,0.10); }

    .error-msg {
      display: none; background: #fff0f0; border: 1px solid #f5c6c6;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; color: #c0392b;
      margin-bottom: 16px; align-items: center; gap: 8px;
    }

    .login-btn {
      width: 100%; background: var(--yellow); color: var(--blue);
      font-weight: 800; font-size: 1rem; padding: 13px;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: inherit; transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover { background: #e09900; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .security-note {
      text-align: center; margin-top: 20px;
      font-size: 0.75rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .security-note i { color: #1a7f4b; }

    .footer-note { color: rgba(255,255,255,0.3); font-size: 0.72rem; margin-top: 24px; text-align: center; }

    @media (max-width: 440px) {
      .card-body { padding: 22px 20px 26px; }
      .card-header { padding: 22px 20px 18px; }
    }
  </style>
</head>
<body>

<a href="index.html" class="brand">
  <img src="https://clickcab-7fv3.vercel.app/images/logo.jpg" alt="Click Cabs" />
  <span class="brand-text">Click<span>Cabs</span></span>
</a>

<div class="card">
  <div class="card-header">
    <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Access Only</div>
    <h2>Admin Portal</h2>
    <p>Sign in to manage vendor applications</p>
  </div>
  <div class="card-body">
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span>Invalid credentials. Please try again.</span>
    </div>

    <div class="form-group">
      <label>Admin Email</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="adminEmail" placeholder="admin@clickcabs.in" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="adminPassword" placeholder="Enter password" />
      </div>
    </div>

    <button class="login-btn" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <div class="security-note">
      <i class="fas fa-lock"></i> Restricted access — authorised personnel only
    </div>
  </div>
</div>

<p class="footer-note">© 2026 Click Cabs. All rights reserved.</p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoITUbvm1c0-Ud9VN_jVOZg99dg42jPgY",
    authDomain: "clickcabs-772bd.firebaseapp.com",
    projectId: "clickcabs-772bd",
    storageBucket: "clickcabs-772bd.firebasestorage.app",
    messagingSenderId: "861153834886",
    appId: "1:861153834886:web:eae295a297c47120c31e07"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  async function handleLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    errorMsg.style.display = 'none';
    if (!email || !password) {
      errorMsg.style.display = 'flex';
      errorMsg.querySelector('span').textContent = 'Please enter email and password.';
      return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
    btn.disabled = true;

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;

      // Check if this user is an admin
      const adminDoc = await getDoc(doc(db, "admins", uid));
      if (!adminDoc.exists()) {
        await auth.signOut();
        throw { code: 'not-admin' };
      }

      window.location.href = 'admin-dashboard.html';
    } catch (error) {
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      btn.disabled = false;
      errorMsg.style.display = 'flex';
      if (error.code === 'not-admin') {
        errorMsg.querySelector('span').textContent = 'You do not have admin access.';
      } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
        errorMsg.querySelector('span').textContent = 'Invalid email or password.';
      } else if (error.code === 'auth/too-many-requests') {
        errorMsg.querySelector('span').textContent = 'Too many attempts. Please wait and try again.';
      } else {
        errorMsg.querySelector('span').textContent = 'Error: ' + error.message;
      }
    }
  }

  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
