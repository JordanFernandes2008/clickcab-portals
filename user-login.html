<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login – Click Cabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --blue:#01456c; --yellow:#f5a800; --border:#dde3ea; --text:#1a2b3c; --muted:#6b7c8d; }
    body { font-family:'Segoe UI',sans-serif; background:#f4f7fa; min-height:100vh; display:flex; flex-direction:column; }
    nav { background:var(--blue); padding:0 40px; display:flex; align-items:center; justify-content:space-between; height:65px; box-shadow:0 2px 8px rgba(0,0,0,0.18); flex-shrink:0; }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo img { height:42px; width:42px; object-fit:contain; border-radius:6px; background:#fff; padding:3px; }
    .nav-logo-text { color:#fff; font-size:1.4rem; font-weight:800; }
    .nav-logo-text span { color:var(--yellow); }
    .nav-signup-btn { background:var(--yellow); color:var(--blue); font-weight:700; padding:8px 22px; border-radius:6px; text-decoration:none; font-size:0.9rem; }
    .nav-signup-btn:hover { opacity:0.88; }
    .main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 20px; }
    .login-card { background:#fff; border-radius:16px; box-shadow:0 6px 32px rgba(1,69,108,0.12); width:100%; max-width:420px; overflow:hidden; }
    .card-header { background:linear-gradient(135deg,var(--blue),#025a8e); padding:32px; text-align:center; color:#fff; }
    .card-header img { width:70px; height:70px; object-fit:contain; border-radius:50%; background:#fff; padding:7px; margin:0 auto 16px; display:block; box-shadow:0 4px 16px rgba(0,0,0,0.18); }
    .card-header h2 { font-size:1.4rem; font-weight:800; margin-bottom:5px; }
    .card-header p { font-size:0.85rem; color:rgba(255,255,255,0.75); }
    .card-body { padding:28px 32px 26px; }
    .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    label { font-size:0.78rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .input-wrap { position:relative; }
    .input-wrap i { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.85rem; }
    input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:11px 14px 11px 38px; font-size:0.92rem; color:var(--text); outline:none; font-family:inherit; transition:border-color 0.2s,box-shadow 0.2s; }
    input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(1,69,108,0.10); }
    .forgot { text-align:right; margin-top:-10px; margin-bottom:20px; }
    .forgot a { font-size:0.8rem; color:var(--blue); text-decoration:none; }
    .forgot a:hover { text-decoration:underline; }
    .error-msg { display:none; background:#fff0f0; border:1px solid #f5c6c6; border-radius:8px; padding:10px 14px; font-size:0.85rem; color:#c0392b; margin-bottom:16px; align-items:center; gap:8px; }
    .login-btn { width:100%; background:var(--yellow); color:var(--blue); font-weight:800; font-size:1rem; padding:13px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .login-btn:hover { background:#e09900; }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--muted); font-size:0.78rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .signup-prompt { text-align:center; font-size:0.88rem; color:var(--muted); }
    .signup-prompt a { color:var(--blue); font-weight:700; text-decoration:none; }
    .signup-prompt a:hover { text-decoration:underline; }
    .back-link { text-align:center; padding:14px; border-top:1px solid var(--border); font-size:0.82rem; background:#fafcff; }
    .back-link a { color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .back-link a:hover { color:var(--blue); }
    @media(max-width:440px) { .card-body { padding:22px 18px 20px; } nav { padding:0 18px; } }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="https://clickcab-7fv3.vercel.app/images/logo.jpg" alt="Click Cabs"/>
    <span class="nav-logo-text">Click<span>Cabs</span></span>
  </a>
  <a href="user-signup.html" class="nav-signup-btn">Sign Up</a>
</nav>
<div class="main">
  <div class="login-card">
    <div class="card-header">
      <img src="https://clickcab-7fv3.vercel.app/images/logo.jpg" alt="Click Cabs"/>
      <h2>Welcome Back</h2>
      <p>Log in to your Click Cabs account</p>
    </div>
    <div class="card-body">
      <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i><span id="errorText">Invalid email or password.</span></div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="you@gmail.com"/></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Enter your password"/></div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
      <div class="divider">or</div>
      <p class="signup-prompt">New here? <a href="user-signup.html">Create a free account</a></p>
    </div>
    <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to home</a></div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCoITUbvm1c0-Ud9VN_jVOZg99dg42jPgY",
    authDomain: "clickcabs-772bd.firebaseapp.com",
    projectId: "clickcabs-772bd",
    storageBucket: "clickcabs-772bd.firebasestorage.app",
    messagingSenderId: "861153834886",
    appId: "1:861153834886:web:eae295a297c47120c31e07"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  await setPersistence(auth, browserLocalPersistence);

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    el.style.display = 'flex';
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    document.getElementById('errorMsg').style.display = 'none';
    if (!email || !password) { showError('Please enter both email and password.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…';
    btn.disabled = true;
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      // Make sure this is a user, not vendor or admin
      const userDoc = await getDoc(doc(db, "users", cred.user.uid));
      if (!userDoc.exists()) {
        await auth.signOut();
        showError('No user account found. Are you a vendor or admin?');
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
        btn.disabled = false;
        return;
      }
      window.location.href = 'https://clickcab-7fv3.vercel.app/home.html';
    } catch (err) {
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
      btn.disabled = false;
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') showError('Invalid email or password.');
      else if (err.code === 'auth/too-many-requests') showError('Too many attempts. Please wait and try again.');
      else showError('Error: ' + err.message);
    }
  }
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
